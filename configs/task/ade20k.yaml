# ADE20K semantic segmentation task config
task:
  name: ade20k_segmentation
  num_classes: 150
  ignore_index: 255

model: tiny

training:
  epochs: 50
  batch_size: 8
  lr: 5.0e-4
  weight_decay: 0.0

data:
  img_size: 64
  streaming: true
  cache_dir: checkpoints/ade20k
  max_train_samples: null
  max_val_samples: null

# Hybrid RWKV-7 + GNN ablation — small
# Matched to ViT-Small parameter count (~21.8M) for fair architecture comparison.
# Architecture: 3 × [1 unidirectional VRWKV-7 → 2 GNN] = 9 layers.
# Unidirectional scan follows Hilbert curve; register tokens provide global
# context that compensates for missing backward scan.
# 1024px input, df=16 (cheap segmentation, fast convergence).
#
# Over-smoothing mitigation:
# - num_gnn_layers=2 (was 3): 144 nodes with knn_k=4 needs ~4 rounds for
#   full receptive field.  2 GNN layers × 3 repetitions = 6 total GNN rounds,
#   which is sufficient without over-smoothing.
# - jk="lstm": Jumping Knowledge preserves multi-scale features across the
#   9 total layers.  Without JK, the deeper GNN layers would overwrite
#   useful early-layer features.
# - register_edge_weight_scale=0.5: 4 registers on 144 nodes create mild
#   hub effect.  0.5× keeps registers useful without overpowering locals.
model:
  img_size: 1024
  embed_dims: 384
  num_heads: 6
  depth: 9
  num_rwkv_layers: 1
  num_gnn_layers: 2
  drop_path_rate: 0.1
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 4
  scatter_output: true
  num_superpixels: 144
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: false
  downsample_factor: 16
  dedup_neighbors: true
  dedup_centroids: true
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: mean
  jk: lstm
  register_edge_weight_scale: 0.5
  use_jit: false

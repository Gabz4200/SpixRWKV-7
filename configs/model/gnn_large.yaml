# GNN (Graph Neural Network) ablation — large
# Mirrors large.yaml but replaces the RWKV-7 recurrence with a stack of
# PyTorch-Geometric message-passing layers over the superpixel KNN graph.
# img_size=-1 => native-resolution input; the GNN processes only 256 superpixel
# tokens, so backbone FLOPS are img_size-independent. Requires native height
# >= ~256 so the segmentation grid (native/df) fits 256 superpixels. df=16.
#
# Over-smoothing mitigation:
# - jk="lstm": Jumping Knowledge preserves multi-scale features across 8
#   layers of message passing on 256 nodes.  Without JK, deep GNN stacks
#   collapse all nodes to similar representations.
# - No register tokens (register_tokens=0) so no hub domination risk.
model:
  img_size: -1
  embed_dims: 768
  num_heads: 12
  depth: 8
  drop_path_rate: 0.3
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: true
  num_superpixels: 256
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  use_attnres: true
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: true
  downsample_factor: 6
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: mean
  jk: lstm
  use_jit: false

# GNN (Graph Neural Network) ablation — small
# Mirrors small.yaml but replaces the RWKV-7 recurrence with a stack of
# PyTorch-Geometric message-passing layers over the superpixel KNN graph.
# 1024px input, df=16 (cheap segmentation, fast convergence). The GNN still sees
# only 144 superpixel tokens, so backbone FLOPS are img_size-independent.
model:
  img_size: 1024
  embed_dims: 256
  num_heads: 4
  depth: 6
  drop_path_rate: 0.1
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: true
  num_superpixels: 144
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: false
  downsample_factor: 16
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: mean
  use_jit: false

# GNN (Graph Neural Network) ablation — small
# Matched to ViT-Small parameter count (~21.8M) for fair architecture comparison.
# GATv2 message passing over superpixel KNN graph replaces RWKV-7 recurrence.
# 1024px input, df=16 (cheap segmentation, fast convergence).
#
# Over-smoothing mitigation:
# - depth=8 (was 15): 144 nodes with knn_k=4 needs ~4-5 rounds for full
#   receptive field coverage.  8 layers gives ample depth without collapse.
# - jk="lstm": Jumping Knowledge (Xu et al., ICML 2018) reads the per-layer
#   feature stack via LSTM and produces a fused representation, preserving
#   multi-scale features that deep GNN stacks would otherwise lose.
# - register_edge_weight_scale=0.5: 4 registers on 144 nodes create a mild
#   hub effect (~2.7% per register, ~11% total).  Scaling to 0.5× keeps
#   registers useful without overpowering local structure.
model:
  img_size: 1024
  embed_dims: 320
  num_heads: 5
  depth: 8
  drop_path_rate: 0.1
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 4
  scatter_output: true
  num_superpixels: 144
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: false
  downsample_factor: 16
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: mean
  jk: lstm
  register_edge_weight_scale: 0.5
  use_jit: false

# Conv-Stem Tiny model config (~1.3M params, depth=2, 36 superpixels)
# Conv stem: 6→32→64→128, 4× reduction (strides 1,2,2)
# Fastest conv config for debugging and convergence testing
model:
  img_size: 64
  embed_dims: 128
  num_heads: 2
  depth: 2
  drop_path_rate: 0.0
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  num_superpixels: 36
  scatter_output: true
  diff_slic_iters: 5
  compactness: 0.5
  norm_layer: rmsnorm
  act_layer: swiglu
  codebook_size: 512
  downsample_factor: 8
  conv_stem_channels: [32, 64, 128]
  conv_stem_kernel_sizes: [3, 5, 5]
  conv_stem_strides: [1, 2, 2]
  conv_stem_norm: batchnorm2d
  conv_post_norm: layernorm

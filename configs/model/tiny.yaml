# Tiny model config (~0.5M params, depth=2, 36 superpixels)
# Debug / fast-iteration tier. The backbone only processes `num_superpixels`
# (36) tokens, so it stays tiny regardless of input resolution: `img_size`
# drives embedding quality (convs + pooling on the full image) while
# `downsample_factor` sets the superpixel segmentation grid (img/df).
# 512px is a comfortable, well-tested resolution here (see
# results/variant_downsample_factor_comparison.md: df=4 @512px cut convergence
# ~4x). Higher df = cheaper segmentation + faster convergence, so we keep 16.
model:
  img_size: 512
  embed_dims: 128
  num_heads: 2
  depth: 2
  drop_path_rate: 0.0
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: true
  num_superpixels: 36
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  norm_layer: rmsnorm
  act_layer: swiglu
  spixel_backend: diff_slic
  use_attnres: false
  attnres_mode: block
  attnres_gate_type: bias
  attnres_num_blocks: 8
  attnres_recency_bias_init: 10.0
  use_jit: false
  downsample_factor: 16

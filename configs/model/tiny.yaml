# Tiny model config (~5.9M params, depth=2, 36 superpixels)
# Matched to ViT-Tiny parameter count for fair architecture comparison.
# The backbone processes 36 superpixel tokens regardless of img_size.
model:
  img_size: 512
  embed_dims: 384
  num_heads: 6
  depth: 2
  drop_path_rate: 0.0
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: true
  num_superpixels: 36
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  norm_layer: rmsnorm
  act_layer: swiglu
  spixel_backend: diff_slic
  use_attnres: false
  attnres_mode: block
  attnres_gate_type: bias
  attnres_num_blocks: 8
  attnres_recency_bias_init: 10.0
  use_jit: false
  downsample_factor: 16

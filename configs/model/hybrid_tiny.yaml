# Hybrid RWKV-7 + GNN ablation — tiny
# Matched to ViT-Tiny parameter count (~5.7M) for fair architecture comparison.
# Architecture: 2 × [1 unidirectional VRWKV-7 → 2 GNN] = 8 layers.
# Unidirectional scan follows Hilbert curve; register tokens provide global
# context that compensates for missing backward scan.
# 512px input, df=16 (cheap segmentation, fast convergence).
#
# Over-smoothing mitigation:
# - num_gnn_layers=2 (was 3): 36 nodes is a very small graph.  With 2 GNN
#   layers per repetition and 2 repetitions, total GNN depth = 4.  Each node
#   sees its 4-hop neighbourhood twice, which is more than enough for 36 nodes.
# - register_edge_weight_scale=0.25: 4 registers on 36 nodes create severe
#   hub domination (each register has degree-36 vs degree-8 for normal nodes).
#   Scaling to 0.25× prevents registers from overpowering local structure.
model:
  img_size: 512
  embed_dims: 192
  num_heads: 3
  depth: 8
  num_rwkv_layers: 1
  num_gnn_layers: 2
  drop_path_rate: 0.1
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 4
  scatter_output: true
  num_superpixels: 36
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: true
  use_attnres: true
  downsample_factor: 2
  dedup_neighbors: true
  dedup_centroids: true
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: sum
  register_edge_weight_scale: 0.25
  use_jit: false

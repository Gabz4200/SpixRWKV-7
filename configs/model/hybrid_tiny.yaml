# Hybrid RWKV-7 + GNN ablation — tiny
# Matched to ViT-Tiny parameter count (~5.7M) for fair architecture comparison.
# Architecture: 3 × [1 unidirectional VRWKV-7 → 3 GNN] = 12 layers.
# Unidirectional scan follows Hilbert curve; register tokens provide global
# context that compensates for missing backward scan.
# 512px input, df=16 (cheap segmentation, fast convergence).
model:
  img_size: 512
  embed_dims: 192
  num_heads: 3
  depth: 12
  num_rwkv_layers: 1
  num_gnn_layers: 3
  drop_path_rate: 0.0
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 4
  scatter_output: true
  num_superpixels: 36
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: false
  downsample_factor: 16
  dedup_neighbors: true
  dedup_centroids: true
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: mean
  use_jit: false

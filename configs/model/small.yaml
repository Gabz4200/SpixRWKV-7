# Small model config (~21.7M params, depth=11, 144 superpixels)
# Matched to ViT-Small parameter count for fair architecture comparison.
# The backbone processes 144 superpixel tokens regardless of img_size.
model:
  img_size: 1024
  embed_dims: 320
  num_heads: 5
  depth: 11
  drop_path_rate: 0.1
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: true
  num_superpixels: 144
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  norm_layer: rmsnorm
  act_layer: swiglu
  spixel_backend: diff_slic
  use_attnres: false
  attnres_mode: block
  attnres_gate_type: bias
  attnres_num_blocks: 8
  attnres_recency_bias_init: 10.0
  use_jit: false
  downsample_factor: 16

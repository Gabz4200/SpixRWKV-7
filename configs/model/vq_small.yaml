# VQ Small model config (~17M params, depth=6, 512 codebook, df=16)
# Compared to spix small: same embed_dims/heads/depth lattice, but token count
# higher (grid size 36x36 = 1296 @16df). No superpixels/spix major differences.

model:
  img_size: 1024
  embed_dims: 256
  num_heads: 4
  depth: 6
  drop_path_rate: 0.0
  init_values: 0.0
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: false
  codebook_size: 1024
  downsample_factor: 16
  latent_dim: null
  num_res_blocks: 2
  use_ema: false
  beta: 0.25
  norm_layer: rmsnorm
  act_layer: swiglu
  use_attnres: false
  attnres_mode: block
  attnres_gate_type: bias
  attnres_num_blocks: 8
  attnres_recency_bias_init: 10.0
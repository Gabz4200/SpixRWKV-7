# Hybrid RWKV-7 + GNN ablation — medium
# Architecture: 4 × [1 unidirectional VRWKV-7 → 3 GNN] = 16 layers.
# Unidirectional scan follows Hilbert curve; register tokens provide global
# context that compensates for missing backward scan.
# 1024px input, df=16 (cheap segmentation, fast convergence).
model:
  img_size: 1024
  embed_dims: 512
  num_heads: 8
  depth: 16
  num_rwkv_layers: 1
  num_gnn_layers: 3
  drop_path_rate: 0.15
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 4
  scatter_output: true
  num_superpixels: 256
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: false
  downsample_factor: 16
  dedup_neighbors: true
  dedup_centroids: true
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: mean
  use_jit: false

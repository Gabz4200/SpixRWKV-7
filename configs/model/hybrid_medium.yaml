# Hybrid RWKV-7 + GNN ablation — medium
# Architecture: 3 × [1 unidirectional VRWKV-7 → 2 GNN] = 9 layers.
# Unidirectional scan follows Hilbert curve; register tokens provide global
# context that compensates for missing backward scan.
# 1024px input, df=16 (cheap segmentation, fast convergence).
#
# Over-smoothing mitigation:
# - num_gnn_layers=2 (was 3): 196 nodes with knn_k=4 needs ~4-5 rounds for
#   full receptive field.  2 GNN layers × 3 repetitions = 6 total GNN rounds,
#   which is sufficient.  12 GNN rounds (old config) would cause severe
#   over-smoothing on 196 nodes.
# - jk="lstm": Jumping Knowledge preserves multi-scale features across the
#   9 total layers.
# - register_edge_weight_scale=0.5: 4 registers on 196 nodes (~2% per register)
#   create mild hub effect.  0.5× keeps registers useful.
model:
  img_size: -1
  embed_dims: 512
  num_heads: 8
  depth: 9
  num_rwkv_layers: 1
  num_gnn_layers: 2
  drop_path_rate: 0.15
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 4
  scatter_output: true
  num_superpixels: 256
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: true
  downsample_factor: 4
  dedup_neighbors: true
  dedup_centroids: true
  use_attnres: true
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: sum
  jk: lstm
  register_edge_weight_scale: 0.5
  use_jit: false

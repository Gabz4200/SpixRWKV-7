# Conv-Stem Small model config (~19M params, depth=6, 144 superpixels)
# Conv stem: 6→64→128→256, 4× reduction (strides 1,2,2)
# Baseline for meaningful representation learning
model:
  img_size: 224
  embed_dims: 256
  num_heads: 4
  depth: 6
  drop_path_rate: 0.1
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  num_superpixels: 144
  scatter_output: true
  diff_slic_iters: 5
  compactness: 0.5
  norm_layer: rmsnorm
  act_layer: swiglu
  codebook_size: 1024
  downsample_factor: 16
  conv_stem_channels: [64, 128, 256]
  conv_stem_kernel_sizes: [3, 5, 5]
  conv_stem_strides: [1, 2, 2]
  conv_stem_norm: batchnorm2d
  conv_post_norm: layernorm

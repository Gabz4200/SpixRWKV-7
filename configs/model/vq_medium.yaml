# VQ Medium model config (~55M params, depth=12, 512 codebook, df=16)
# Extended tokenizer, deeper backbone, similar embed/head progression as spix medium.

model:
  img_size: 768
  embed_dims: 512
  num_heads: 8
  depth: 12
  drop_path_rate: 0.0
  init_values: 0.0
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: false
  codebook_size: 512
  downsample_factor: 16
  latent_dim: null
  num_res_blocks: 2
  use_ema: false
  beta: 0.25
  norm_layer: rmsnorm
  act_layer: swiglu
  use_attnres: true
  use_cpp: true
  attnres_mode: block
  attnres_gate_type: bias
  attnres_num_blocks: 8
  attnres_recency_bias_init: 10.0

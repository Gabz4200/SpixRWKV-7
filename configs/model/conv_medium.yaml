# Conv-Stem Medium model config (~58M params, depth=12, 196 superpixels)
# Conv stem: 6→64→128→256, 4× reduction (strides 1,2,2)
# Competitive with ViT-B/16
model:
  img_size: 512
  embed_dims: 512
  num_heads: 8
  depth: 12
  drop_path_rate: 0.2
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  num_superpixels: 196
  scatter_output: true
  diff_slic_iters: 5
  compactness: 0.5
  norm_layer: rmsnorm
  act_layer: swiglu
  codebook_size: 1024
  downsample_factor: 16
  conv_stem_channels: [64, 128, 256]
  conv_stem_kernel_sizes: [3, 5, 5]
  conv_stem_strides: [1, 2, 2]
  conv_stem_norm: batchnorm2d
  conv_post_norm: layernorm

# Conv-Stem Medium model config (~58M params, depth=12, 196 superpixels)
# Conv stem: 6→64→128→256, 4x reduction (strides 1,2,2).
# Competitive with ViT-B/16. img_size=-1 => native-resolution input; the
# backbone processes only 196 superpixel tokens. Requires native height >= ~256.
model:
  img_size: -1
  embed_dims: 512
  num_heads: 8
  depth: 12
  drop_path_rate: 0.2
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: true
  num_superpixels: 196
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  norm_layer: rmsnorm
  act_layer: swiglu
  spixel_backend: diff_slic
  use_attnres: false
  attnres_mode: block
  attnres_gate_type: bias
  attnres_num_blocks: 8
  attnres_recency_bias_init: 10.0
  use_cpp: false
  use_jit: false
  conv_stem_channels: [64, 128, 256]
  conv_stem_kernel_sizes: [3, 5, 5]
  conv_stem_strides: [1, 2, 2]
  conv_stem_norm: layernorm
  conv_post_norm: layernorm

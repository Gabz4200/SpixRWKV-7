# VQ Tiny model config (~5.4M params, depth=2, 512 codebook entries, downsample_factor=16)
# Matched to ViT-Tiny parameter count for fair architecture comparison.
# VQ-VAE tokenizer adds ~2.7M params (encoder + decoder + codebook).
model:
  img_size: 256
  embed_dims: 192
  num_heads: 3
  depth: 2
  drop_path_rate: 0.1
  init_values: 0.0
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 0
  scatter_output: false
  codebook_size: 128
  downsample_factor: 16
  latent_dim: null
  num_res_blocks: 2
  use_ema: false
  beta: 0.25
  norm_layer: rmsnorm
  act_layer: swiglu
  use_attnres: true
  use_cpp: true
  attnres_mode: block
  attnres_gate_type: bias
  attnres_num_blocks: 8
  attnres_recency_bias_init: 10.0

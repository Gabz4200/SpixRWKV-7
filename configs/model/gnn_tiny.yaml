# GNN (Graph Neural Network) ablation — tiny
# Matched to ViT-Tiny parameter count (~5.7M) for fair architecture comparison.
# GATv2 message passing over superpixel KNN graph replaces RWKV-7 recurrence.
# 512px input, df=16 (cheap segmentation, fast convergence).
model:
  img_size: 512
  embed_dims: 256
  num_heads: 4
  depth: 6
  drop_path_rate: 0.0
  init_values: 1.0e-5
  final_norm: true
  out_indices: [-1]
  with_cls_token: false
  output_cls_token: false
  register_tokens: 4
  scatter_output: true
  num_superpixels: 36
  spixel_size: null
  diff_slic_iters: 5
  compactness: 0.5
  spixel_backend: diff_slic
  norm_layer: rmsnorm
  act_layer: swiglu
  use_cpp: false
  downsample_factor: 16
  gnn_conv: gatv2
  gnn_heads: 4
  gnn_aggr: mean
  use_jit: false
